name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: valora-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: valora-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # TODO Story 1.9 (Test Foundation): adicionar job 'backend' com setup-java@v4 + cd valora-backend && ./mvnw clean verify
