spring:
  application:
    name: valora-backend
  profiles:
    default: local                          
  datasource:
    url: ${URL_DB} 
    username: ${USERNAME_DB} 
    password: ${PASSWORD_DB} 
  jpa:
    hibernate:
      ddl-auto: validate                    
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false                     
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true                   
  jackson:
    serialization:
      write-dates-as-timestamps: false     
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

valora:
  jwt:
    secret: "${JWT_SECRET:?JWT_SECRET é obrigatório — mín. 256 bits, gerar com openssl rand -base64 64}"
    expirationMinutes: ${JWT_EXPIRATION_MINUTES:240}
    cookie:
      secure: ${JWT_COOKIE_SECURE:true}
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: ${SERVER_PORT:8080}                 
  error:
    include-stacktrace: never               
    include-message: never                  
    include-binding-errors: never           

management:
  endpoints:
    web:
      exposure:
        include: health,info                
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMINISTRATOR

logging:
  level:
    root: INFO
    br.com.senac.valora: DEBUG              

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
