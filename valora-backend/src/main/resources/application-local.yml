spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5433/valora_local
    username: valora_dev
    password: valora_dev

valora:
  jwt:
    # Secret apenas para dev local — NUNCA usar em homol/prod
    secret: dev-only-secret-min-256-bits-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    expirationMinutes: 240
    cookie:
      # Local roda HTTP (sem HTTPS) — cookie não pode ter Secure=true ou browser descarta.
      secure: false

logging:
  level:
    root: INFO
    br.com.senac.valora: DEBUG
    org.hibernate.SQL: DEBUG                                # SQL com '?' placeholders — seguro
    # NUNCA TRACE em BasicBinder — registra valores de bind, incluindo password hash em login.
    # Deferred work resolvido pela Story 1.3 (AC9).
    org.flywaydb: INFO
